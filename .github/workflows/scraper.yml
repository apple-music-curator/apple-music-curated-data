name: Run Crawler

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 */3 * *" # every 3 days at 09:00 UTC

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          npm install
          npx playwright install chromium

      - name: Run crawler
        run: npm run crawl

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: crawler-data
          path: data/
